services:
  gestionvet:
    build: .
    container_name: gestionvet
    #ports:
    #  - "${PORT:-3000}:3000"
    environment:
      AUTH_USER: ${AUTH_USER:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:?Define AUTH_PASSWORD en un archivo .env}
      JWT_SECRET: ${JWT_SECRET:?Define JWT_SECRET en un archivo .env}
      AUTH_SESSION_DAYS: ${AUTH_SESSION_DAYS:-30}
      CURRENCY_LOCALE: ${CURRENCY_LOCALE:-es-CL}
      CURRENCY: ${CURRENCY:-CLP}
      DATABASE_PATH: /app/data/gestionvet.db
    volumes:
      - gestionvet-data:/app/data
    restart: unless-stopped

volumes:
  gestionvet-data:
